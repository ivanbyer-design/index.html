<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#191919">
<title>Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --font:'Inter',system-ui,sans-serif;
  --bg:#fafaf9;--bg-h:#f3f2ef;--bg-a:#eceae4;
  --bg-card:#ffffff;--bg-in:#f3f2ef;--bg-tag:#e8e7e3;
  --t:#2f2d28;--ts:#706e6b;--th:#b0ada6;--ti:#ffffff;
  --bd:#e5e4e0;--bd2:#cccbc6;
  --green:#0a7c6e;--gbg:#dff2ec;
  --red:#c0342c;--rbg:#fde9e7;
  --amber:#c58c1e;--abg:#fef3d6;
  --blue:#2d78a4;--bbg:#e3f1f9;
  --purple:#8a5fae;--pbg:#f0eaf7;
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --sh-lg:0 8px 30px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.06);
  --tab-h:64px;--top-h:52px;
}
[data-dark]{
  --bg:#141414;--bg-h:#242424;--bg-a:#2e2e2e;
  --bg-card:#1e1e1e;--bg-in:#242424;--bg-tag:#2e2e2e;
  --t:#dedad3;--ts:#908e8b;--th:#5e5d5a;--ti:#141414;
  --bd:#2e2e2e;--bd2:#404040;
  --green:#3da892;--gbg:#172f2b;
  --red:#d9706a;--rbg:#321a19;
  --amber:#cc9840;--abg:#312810;
  --blue:#5ca4cf;--bbg:#152638;
  --sh:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --sh-md:0 4px 12px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.2);
}

/* ── RESET ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:var(--font);color:var(--t);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ─────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:env(safe-area-inset-top);}

/* TOPBAR */
.topbar{height:var(--top-h);flex-shrink:0;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid var(--bd);background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:50;}
.tb-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-0.02em;color:var(--t);}
.tb-streak{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--bg-a);font-size:12px;font-weight:700;color:var(--ts);}
.tb-streak.hot{background:color-mix(in srgb,var(--amber) 15%,var(--bg));color:var(--amber);}
.tb-streak-num{font-size:15px;font-weight:800;color:var(--t);}
.tb-streak.hot .tb-streak-num{color:var(--amber);}
.ic-btn{width:34px;height:34px;border-radius:var(--r);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ts);font-size:18px;transition:background .12s;}
.ic-btn:hover{background:var(--bg-a);color:var(--t);}

/* PANELS */
.main-content{flex:1;overflow:hidden;position:relative;}
.panel{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.panel.on{display:block;}
.pcontent{padding:20px 18px calc(var(--tab-h) + 28px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto;}

/* BOTTOM TABS */
.bottom-tabs{height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;display:flex;border-top:1px solid var(--bd);background:color-mix(in srgb,var(--bg) 95%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--th);font-family:var(--font);transition:color .15s;padding:6px 4px;}
.tab-icon{font-size:20px;line-height:1;}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.02em;}
.tab.on{color:var(--blue);}

/* ── COMMON COMPONENTS ──────────────────────────── */
.section-hdr{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.09em;margin:20px 0 8px;}
.section-hdr:first-child{margin-top:4px;}
.card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:8px;}
.card-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--bd);}
.card-row:first-child{border-top:none;}
.card-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:12px;color:var(--ts);margin-top:1px;}
.card-meta{font-size:13px;font-weight:600;color:var(--t);flex-shrink:0;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;}
.badge.green{background:var(--gbg);color:var(--green);}
.badge.red{background:var(--rbg);color:var(--red);}
.badge.amber{background:var(--abg);color:var(--amber);}
.badge.blue{background:var(--bbg);color:var(--blue);}
.badge.gray{background:var(--bg-a);color:var(--ts);}
.divider{height:1px;background:var(--bd);margin:18px 0;}
.empty{padding:32px 20px;text-align:center;color:var(--th);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:8px;}
.empty-title{font-weight:600;color:var(--ts);font-size:14px;margin-bottom:4px;}
.progress-wrap{background:var(--bd);border-radius:10px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width .4s ease;}
.progress-fill.green{background:var(--green);}
.progress-fill.blue{background:var(--blue);}
.progress-fill.amber{background:var(--amber);}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;background:var(--bg-tag);color:var(--ts);cursor:pointer;transition:background .12s;}
.tag:hover{background:var(--bg-a);}
.tag.on{background:var(--blue);color:#fff;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.summary-row{display:grid;gap:8px;margin-bottom:14px;}
.summary-row.cols-3{grid-template-columns:repeat(3,1fr);}
.summary-row.cols-4{grid-template-columns:repeat(4,1fr);}
.sum-cell{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;text-align:center;box-shadow:var(--sh);}
.sum-cell-val{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--t);line-height:1;}
.sum-cell-val.up{color:var(--green);}
.sum-cell-val.dn{color:var(--red);}
.sum-cell-val.amb{color:var(--amber);}
.sum-cell-lbl{font-size:10px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.chart-wrap{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.chart-title{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

/* FORMS */
.fi{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-in);color:var(--t);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--th);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;min-height:80px;line-height:1.5;}
.form-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.form-row .fi{flex:1;min-width:120px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--r);border:1px solid var(--bd);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--t);transition:background .12s,transform .1s;white-space:nowrap;}
.btn:hover{background:var(--bg-h);}
.btn:active{transform:scale(.97);}
.btn.pri{background:var(--t);color:var(--ti);border-color:var(--t);}
.btn.pri:hover{opacity:.88;}
.btn.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn.green:hover{opacity:.9;}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ts);}
.btn.ghost:hover{background:var(--bg-h);color:var(--t);}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.full{width:100%;}
.btn.icon{padding:5px 8px;font-size:15px;min-width:30px;}
.collapse-body{display:none;}
.collapse-body.open{display:block;}
.flex-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}

/* ── MODALS ─────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;opacity:0;transition:opacity .25s;pointer-events:none;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{width:100%;max-width:680px;margin:0 auto;background:var(--bg-card);border-radius:20px 20px 0 0;padding:8px 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:92dvh;overflow-y:auto;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bd2);margin:8px auto 18px;}
.modal-title{font-size:18px;font-weight:800;color:var(--t);letter-spacing:-.02em;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--ts);margin-bottom:18px;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions .btn{flex:1;}

/* ── TODAY PANEL ────────────────────────────────── */
.today-greeting{padding:20px 0 16px;border-bottom:1px solid var(--bd);margin-bottom:18px;}
.today-greeting-label{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;}
.today-greeting-title{font-size:26px;font-weight:800;color:var(--t);letter-spacing:-.03em;line-height:1.15;margin-bottom:3px;}
.today-greeting-date{font-size:13px;color:var(--ts);}
/* Stack card */
.stack-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;padding:22px 20px;box-shadow:var(--sh-md);margin-bottom:14px;}
.stack-card.active{border-color:var(--blue);box-shadow:0 0 0 2px color-mix(in srgb,var(--blue) 18%,transparent),var(--sh-md);}
.stack-cue{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;background:var(--bbg);padding:4px 10px;border-radius:20px;margin-bottom:14px;}
.stack-routine{font-size:22px;font-weight:700;color:var(--t);letter-spacing:-.02em;line-height:1.3;margin-bottom:20px;}
.stack-actions{display:flex;gap:10px;align-items:center;}
.stack-done-btn{flex:1;padding:13px;border-radius:var(--rl);border:none;background:var(--t);color:var(--ti);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.01em;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:7px;}
.stack-done-btn:hover{opacity:.88;}
.stack-done-btn:active{transform:scale(.97);}
.stack-skip-btn{padding:11px 16px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;color:var(--ts);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:background .12s;white-space:nowrap;}
.stack-skip-btn:hover{background:var(--bg-h);color:var(--t);}
/* Progress */
.stack-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.stack-progress-bar{flex:1;}
.stack-progress-label{font-size:12px;font-weight:700;color:var(--ts);white-space:nowrap;}
/* Queue */
.stack-queue{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.queue-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);background:var(--bg-card);border:1px solid var(--bd);font-size:13px;color:var(--ts);}
.queue-item.done{opacity:.45;}
.queue-item.done .queue-item-text{text-decoration:line-through;}
.queue-item.skipped{opacity:.5;}
.queue-item.current{border-color:var(--blue);color:var(--t);font-weight:600;background:var(--bbg);}
.queue-item-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;}
.queue-item.done .queue-item-check{background:var(--green);border-color:var(--green);color:#fff;}
.queue-item.skipped .queue-item-check{background:var(--bg-a);border-color:var(--bd2);color:var(--th);}
.queue-item.current .queue-item-check{border-color:var(--blue);}
.queue-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.queue-item-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Morning trigger */
.morning-trigger{margin-bottom:20px;}
.morning-trigger-label{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.top3-task{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:6px;cursor:pointer;transition:background .12s;}
.top3-task:hover{background:var(--bg-h);}
.top3-task-pri{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.top3-task-text{flex:1;font-size:14px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-task-check{font-size:16px;color:var(--th);line-height:1;}
.top3-task.done .top3-task-text{text-decoration:line-through;color:var(--ts);}
.top3-task.done .top3-task-check{color:var(--green);}
.start-day-btn{width:100%;padding:14px;border-radius:var(--rl);border:none;background:var(--t);color:var(--ti);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.01em;margin-top:16px;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.start-day-btn:hover{opacity:.88;}
.start-day-btn:active{transform:scale(.97);}
/* Complete card */
.all-done-card{background:var(--gbg);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);border-radius:16px;padding:28px 22px;text-align:center;margin-bottom:16px;}
.all-done-icon{font-size:42px;margin-bottom:10px;}
.all-done-title{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-.02em;margin-bottom:6px;}
.all-done-sub{font-size:13px;color:color-mix(in srgb,var(--green) 70%,var(--t));}
.end-day-btn{width:100%;padding:12px;border-radius:var(--rl);border:1px solid color-mix(in srgb,var(--green) 40%,transparent);background:color-mix(in srgb,var(--green) 8%,var(--bg-card));color:var(--green);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:8px;}
.end-day-btn:hover{background:color-mix(in srgb,var(--green) 15%,var(--bg-card));}
/* Stack builder */
.stack-builder{margin-top:24px;padding-top:20px;border-top:1px solid var(--bd);}
.stack-builder-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;padding:2px 0;}
.stack-builder-title{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;}
.stack-builder-toggle{font-size:12px;color:var(--blue);font-weight:600;}
.stack-item-edit{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:5px;transition:border-color .12s;}
.stack-item-edit:hover{border-color:var(--bd2);}
.drag-grip{color:var(--th);font-size:14px;cursor:grab;flex-shrink:0;padding:0 2px;line-height:1;}
.drag-grip:active{cursor:grabbing;}
.stack-item-edit-text{flex:1;min-width:0;}
.stack-item-cue-small{font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.05em;}
.stack-item-routine-small{font-size:13px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* EOD mood */
.mood-picker{display:flex;gap:6px;margin-bottom:4px;}
.mood-btn{flex:1;padding:10px 4px;border-radius:var(--r);border:2px solid var(--bd);background:transparent;cursor:pointer;font-size:22px;text-align:center;transition:border-color .15s,background .15s;}
.mood-btn.on{border-color:var(--blue);background:var(--bbg);}

/* ── FINANCE PANEL ──────────────────────────────── */
.balance-hero{padding:20px 0 16px;border-bottom:1px solid var(--bd);margin-bottom:18px;}
.balance-hero-label{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;}
.balance-hero-amount{font-size:36px;font-weight:800;letter-spacing:-.04em;color:var(--t);line-height:1;}
.balance-hero-amount.up{color:var(--green);}
.balance-hero-amount.dn{color:var(--red);}
.balance-hero-row{display:flex;gap:24px;margin-top:12px;}
.balance-hero-stat-val{font-size:17px;font-weight:700;letter-spacing:-.02em;}
.balance-hero-stat-val.up{color:var(--green);}
.balance-hero-stat-val.dn{color:var(--red);}
.balance-hero-stat-lbl{font-size:11px;color:var(--ts);margin-top:1px;}
.bill-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--bd);}
.bill-item:first-child{border-top:none;}
.bill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.bill-dot.paid{background:var(--green);}
.bill-dot.due{background:var(--amber);}
.bill-dot.overdue{background:var(--red);}
.bill-name{font-size:13px;font-weight:500;color:var(--t);}
.bill-status-txt{font-size:11px;color:var(--ts);}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bd);}
.tx-item:first-child{border-top:none;}
.tx-cat-icon{width:32px;height:32px;border-radius:var(--r);background:var(--bg-a);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tx-desc{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-date{font-size:11px;color:var(--ts);}
.tx-amount{font-size:14px;font-weight:700;flex-shrink:0;}
.tx-amount.inc{color:var(--green);}
.tx-type-toggle{display:flex;gap:8px;margin-bottom:10px;}
.tx-type-btn{flex:1;padding:9px;border-radius:var(--r);border:2px solid var(--bd);background:transparent;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.tx-type-btn.exp.on{border-color:var(--red);background:var(--rbg);color:var(--red);}
.tx-type-btn.inc.on{border-color:var(--green);background:var(--gbg);color:var(--green);}

/* ── GOALS PANEL ────────────────────────────────── */
.goal-item{padding:14px;cursor:pointer;}
.goal-item+.goal-item{border-top:1px solid var(--bd);}
.goal-header{display:flex;align-items:flex-start;gap:10px;}
.goal-type-icon{font-size:20px;flex-shrink:0;line-height:1.3;}
.goal-meta{flex:1;min-width:0;}
.goal-title{font-size:14px;font-weight:600;color:var(--t);}
.goal-title.done{text-decoration:line-through;color:var(--ts);}
.goal-sub{font-size:12px;color:var(--ts);margin-top:2px;}
.goal-progress-row{display:flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:4px;}
.goal-progress-label{font-size:11px;color:var(--ts);flex:1;}
.goal-progress-pct{font-size:11px;font-weight:700;color:var(--t);}
.milestone-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:none;}
.milestone-list.open{display:block;}
.milestone-item{display:flex;align-items:center;gap:8px;padding:7px 2px;cursor:pointer;}
.milestone-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;transition:all .15s;}
.milestone-item.done .milestone-check{background:var(--green);border-color:var(--green);color:#fff;}
.milestone-item.done .milestone-text{text-decoration:line-through;color:var(--ts);}
.milestone-text{flex:1;font-size:13px;color:var(--t);}

/* ── HEALTH PANEL ───────────────────────────────── */
.meal-section{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:6px;box-shadow:var(--sh);}
.meal-section-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;transition:background .12s;}
.meal-section-hdr:hover{background:var(--bg-h);}
.meal-section-icon{font-size:16px;width:20px;text-align:center;}
.meal-section-label{flex:1;font-size:13px;font-weight:600;color:var(--t);}
.meal-section-meta{font-size:12px;color:var(--ts);}
.meal-section-body{border-top:1px solid var(--bd);padding:12px 14px;display:none;}
.meal-section-body.open{display:block;}
.meal-entry{display:flex;align-items:center;gap:8px;padding:6px 0;}
.meal-entry+.meal-entry{border-top:1px solid var(--bd);}
.meal-entry-text{flex:1;font-size:13px;color:var(--t);}
.meal-entry-cal{font-size:11px;color:var(--ts);white-space:nowrap;}
.meal-entry-del{color:var(--th);font-size:14px;cursor:pointer;padding:2px 4px;}
.meal-entry-del:hover{color:var(--red);}
.water-tracker{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:8px;box-shadow:var(--sh);}
.water-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.water-title{flex:1;font-size:13px;font-weight:600;color:var(--t);}
.water-count{font-size:13px;font-weight:700;color:var(--blue);}
.water-glasses{display:flex;gap:6px;flex-wrap:wrap;}
.glass{width:34px;height:40px;border:2px solid var(--bd2);border-radius:5px 5px 7px 7px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;}
.glass.filled{background:var(--bbg);border-color:var(--blue);}
.glass:hover{border-color:var(--blue);}
.workout-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--bd);}
.workout-item:first-child{border-top:none;}
.workout-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0;}
.workout-meta{flex:1;min-width:0;}
.workout-type{font-size:13px;font-weight:600;color:var(--t);}
.workout-details{font-size:11px;color:var(--ts);margin-top:1px;}
.workout-duration{font-size:13px;font-weight:700;color:var(--ts);}

/* ── NOTES PANEL ────────────────────────────────── */
.note-item{padding:13px 14px;cursor:pointer;border-top:1px solid var(--bd);}
.note-item:first-child{border-top:none;}
.note-item:hover{background:var(--bg-h);}
.note-title{font-size:14px;font-weight:600;color:var(--t);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-preview{font-size:12px;color:var(--ts);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-footer{display:flex;align-items:center;gap:8px;margin-top:6px;}
.note-date{font-size:11px;color:var(--th);}
.sched-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bd);}
.sched-item:first-child{border-top:none;}
.sched-time{font-size:12px;font-weight:700;color:var(--blue);min-width:44px;}
.sched-title{font-size:13px;font-weight:500;color:var(--t);}
.sched-date-lbl{font-size:11px;color:var(--ts);}
.week-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.week-mini-day{text-align:center;}
.week-mini-lbl{font-size:9px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.week-mini-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:13px;font-weight:600;color:var(--ts);cursor:pointer;transition:background .12s;position:relative;}
.week-mini-num:hover{background:var(--bg-a);}
.week-mini-num.today{background:var(--blue);color:#fff;font-weight:700;}
.week-mini-num.has-events::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--amber);position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);}

/* ── SETTINGS PANEL ─────────────────────────────── */
.stt-section{margin-bottom:20px;}
.stt-section-hdr{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;}
.stt-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:1px solid var(--bd);}
.stt-row:first-child{border-top:none;}
.stt-row-info{flex:1;}
.stt-row-label{font-size:14px;font-weight:500;color:var(--t);}
.stt-row-sub{font-size:12px;color:var(--ts);margin-top:1px;}
.theme-picker{display:flex;gap:8px;padding:12px 14px;}
.theme-opt{flex:1;border:2px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s;}
.theme-opt.on{border-color:var(--blue);}
.theme-swatch{height:44px;background:#fafaf9;}
.theme-swatch.dark{background:#141414;}
.theme-swatch.system{background:linear-gradient(to right,#fafaf9 50%,#141414 50%);}
.theme-label{font-size:11px;font-weight:600;color:var(--ts);text-align:center;padding:6px 4px;background:var(--bg-card);}
.theme-opt.on .theme-label{color:var(--blue);}

/* ── DASHBOARD SECTOR CARDS ─────────────────────── */
.sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px;}
.sector-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px 13px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--sh);display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;}
.sector-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.sector-card:active{transform:scale(.97);}
.sector-card-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rl) var(--rl) 0 0;}
.sector-card-icon{font-size:22px;margin-bottom:4px;line-height:1;}
.sector-card-val{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--t);line-height:1;}
.sector-card-val.up{color:var(--green);}
.sector-card-val.dn{color:var(--red);}
.sector-card-val.blue{color:var(--blue);}
.sector-card-lbl{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.sector-card-sub{font-size:11px;color:var(--th);}

/* ── LIFE OS HERO ────────────────────────────────── */
.los-hero{padding:22px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:20px;}
.los-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.los-hero-left{flex:1;}
.los-hero-label{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;}
.los-hero-title{font-size:28px;font-weight:800;color:var(--t);letter-spacing:-.03em;line-height:1.15;margin-bottom:3px;}
.los-hero-date{font-size:13px;color:var(--ts);}
.los-streak-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--t),color-mix(in srgb,var(--t) 75%,var(--blue)));border-radius:var(--rl);padding:12px 16px;min-width:72px;box-shadow:var(--sh-md);flex-shrink:0;}
.los-streak-num{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1;}
.los-streak-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;text-align:center;}

/* ── FINANCE VISUAL MODEL ────────────────────────── */
.fin-overview{background:var(--t);border-radius:16px;padding:22px 20px 18px;margin-bottom:14px;position:relative;overflow:hidden;}
.fin-overview::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05);}
.fin-overview::after{content:'';position:absolute;bottom:-70px;right:10px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.fin-ov-month{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;position:relative;}
.fin-ov-net{font-size:38px;font-weight:800;letter-spacing:-.04em;line-height:1;position:relative;}
.fin-ov-net.pos{color:#4ade80;}
.fin-ov-net.neg{color:#f87171;}
.fin-ov-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:18px;position:relative;}
.fin-ov-bars{display:flex;flex-direction:column;gap:9px;position:relative;}
.fin-bar-row{display:flex;align-items:center;gap:10px;}
.fin-bar-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);min-width:58px;}
.fin-bar-track{flex:1;height:7px;background:rgba(255,255,255,.12);border-radius:10px;overflow:hidden;}
.fin-bar-fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.fin-bar-fill.inc{background:linear-gradient(90deg,#34d399,#4ade80);}
.fin-bar-fill.exp{background:linear-gradient(90deg,#f87171,#fb923c);}
.fin-bar-amount{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);min-width:68px;text-align:right;}
.fin-ov-pills{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;position:relative;}
.fin-ov-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.1);font-size:12px;font-weight:600;color:rgba(255,255,255,.85);cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:background .15s;}
.fin-ov-pill:hover{background:rgba(255,255,255,.18);}
.fin-month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.fin-month-nav-title{flex:1;font-size:15px;font-weight:700;color:var(--t);}
.fin-month-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ts);transition:background .12s;}
.fin-month-btn:hover{background:var(--bg-h);}
.fin-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.fin-stat{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 10px;text-align:center;box-shadow:var(--sh);}
.fin-stat-val{font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--t);line-height:1;}
.fin-stat-val.up{color:var(--green);}
.fin-stat-val.dn{color:var(--red);}
.fin-stat-lbl{font-size:9px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}

/* ── PULL-TO-REFRESH ─────────────────────────────── */
.ptr-indicator{position:absolute;top:0;left:0;right:0;height:0;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;z-index:40;transition:height .2s;pointer-events:none;}
.ptr-spinner{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--bd2);border-top-color:var(--blue);animation:spin .7s linear infinite;margin-bottom:10px;opacity:0;transition:opacity .2s;}
.ptr-indicator.ready .ptr-spinner{border-top-color:var(--green);}
.ptr-indicator.active .ptr-spinner{opacity:1;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── BILLS CALENDAR ──────────────────────────────── */
.bil-view-toggle{display:flex;gap:6px;margin-bottom:12px;}
.bil-view-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--bg-card);font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;transition:background .12s;}
.bil-view-btn.on{background:var(--t);color:var(--ti);border-color:var(--t);}
.bil-calendar{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;box-shadow:var(--sh);margin-bottom:10px;}
.bil-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.bil-cal-dow{font-size:10px;font-weight:700;color:var(--th);text-align:center;padding:4px 0;text-transform:uppercase;}
.bil-cal-day{min-height:42px;border-radius:var(--r);padding:4px 3px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;cursor:default;}
.bil-cal-day.other-month{opacity:.3;}
.bil-cal-day.today-cal{background:var(--bbg);}
.bil-cal-dn{font-size:11px;font-weight:600;color:var(--ts);line-height:1;}
.bil-cal-day.today-cal .bil-cal-dn{color:var(--blue);font-weight:800;}
.bil-cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── LIFE EXPENSES ───────────────────────────────── */
.lx-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:8px;}
.lx-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:1px solid var(--bd);}
.lx-item:first-child{border-top:none;}
.lx-icon-wrap{width:38px;height:38px;border-radius:var(--r);background:var(--bg-a);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.lx-body{flex:1;min-width:0;}
.lx-name{font-size:14px;font-weight:600;color:var(--t);}
.lx-meta{font-size:11px;color:var(--ts);margin-top:1px;}
.lx-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.lx-cost{font-size:14px;font-weight:700;color:var(--t);}
.lx-status{font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;}
.lx-status.ok{background:var(--gbg);color:var(--green);}
.lx-status.soon{background:var(--abg);color:var(--amber);}
.lx-status.over{background:var(--rbg);color:var(--red);}

/* ── FINANCE FAB ─────────────────────────────────── */
.fin-fab{position:fixed;right:20px;bottom:calc(var(--tab-h) + 16px + env(safe-area-inset-bottom));width:52px;height:52px;border-radius:50%;background:var(--t);color:#fff;border:none;cursor:pointer;font-size:26px;font-weight:300;line-height:1;box-shadow:0 4px 20px rgba(0,0,0,.28),0 2px 8px rgba(0,0,0,.16);z-index:130;display:none;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.fin-fab:hover{box-shadow:0 6px 26px rgba(0,0,0,.32);}
.fin-fab:active{transform:scale(.92);}
.fin-fab.visible{display:flex;}

/* ── MOBILE ─────────────────────────────────────── */
@media(max-width:600px){
  .pcontent{padding:14px 14px calc(var(--tab-h) + 20px + env(safe-area-inset-bottom));}
  input,select,textarea{font-size:16px!important;}
  .summary-row.cols-4{grid-template-columns:repeat(2,1fr);}
  .stack-routine{font-size:19px;}
  .modal-sheet{max-height:95dvh;}
  .section-hdr:first-child{margin-top:0;}
  .sector-grid{grid-template-columns:repeat(2,1fr);}
  .fin-ov-net{font-size:30px;}
  .los-hero-title{font-size:24px;}
  .fin-fab{right:16px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="tb-title" id="tb-title">Life OS</div>
    <div id="tb-streak" class="tb-streak" style="display:none">
      <span>🔥</span><span class="tb-streak-num" id="tb-streak-num">0</span><span>day streak</span>
    </div>
    <button class="ic-btn" onclick="go('settings')" title="Settings">⚙</button>
  </header>

  <!-- PANELS -->
  <main class="main-content">

    <div class="panel on" id="p-today">
      <div class="pcontent">
        <div class="los-hero">
          <div class="los-hero-top">
            <div class="los-hero-left">
              <div class="los-hero-label" id="today-greeting-label">Good morning</div>
              <div class="los-hero-title">Life OS</div>
              <div class="los-hero-date" id="today-greeting-date"></div>
            </div>
            <div class="los-streak-badge" id="los-streak-badge" style="display:none">
              <div class="los-streak-num" id="los-streak-num">0</div>
              <div class="los-streak-lbl">day<br>streak</div>
            </div>
          </div>
        </div>
        <div id="today-body"></div>
      </div>
    </div>

    <div class="panel" id="p-finance">
      <div class="pcontent"><div id="finance-body"></div></div>
    </div>

    <div class="panel" id="p-goals">
      <div class="pcontent"><div id="goals-body"></div></div>
    </div>

    <div class="panel" id="p-health">
      <div class="pcontent"><div id="health-body"></div></div>
    </div>

    <div class="panel" id="p-notes">
      <div class="pcontent"><div id="notes-body"></div></div>
    </div>

    <div class="panel" id="p-settings">
      <div class="pcontent"><div id="settings-body"></div></div>
    </div>

  </main>

  <!-- BOTTOM TABS -->
  <nav class="bottom-tabs">
    <button class="tab on" data-tab="today" onclick="go('today')">
      <span class="tab-icon">◎</span><span class="tab-label">Today</span>
    </button>
    <button class="tab" data-tab="finance" onclick="go('finance')">
      <span class="tab-icon">💳</span><span class="tab-label">Finance</span>
    </button>
    <button class="tab" data-tab="goals" onclick="go('goals')">
      <span class="tab-icon">🎯</span><span class="tab-label">Goals</span>
    </button>
    <button class="tab" data-tab="health" onclick="go('health')">
      <span class="tab-icon">🥗</span><span class="tab-label">Health</span>
    </button>
    <button class="tab" data-tab="notes" onclick="go('notes')">
      <span class="tab-icon">📝</span><span class="tab-label">Notes</span>
    </button>
  </nav>

</div><!-- .app -->

<!-- ── MODALS ─────────────────────────────────────── -->

<!-- Stack item modal -->
<div class="modal-overlay" id="stack-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="stack-modal-title">Add Habit</div>
    <div class="modal-sub">Chain habits with "After I do X, I will Y"</div>
    <input type="hidden" id="stack-modal-id">
    <div class="modal-field">
      <label>Icon (emoji)</label>
      <input class="fi" id="stack-modal-icon" placeholder="🌅" style="max-width:80px;font-size:20px;text-align:center;">
    </div>
    <div class="modal-field">
      <label>After I...</label>
      <input class="fi" id="stack-modal-cue" placeholder="e.g. make my morning coffee">
    </div>
    <div class="modal-field">
      <label>I will...</label>
      <input class="fi" id="stack-modal-routine" placeholder="e.g. review my finances for 5 min" onkeydown="if(event.key==='Enter')saveStackItem()">
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('stack-modal')">Cancel</button>
      <button class="btn pri" onclick="saveStackItem()">Save</button>
    </div>
  </div>
</div>

<!-- Task modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">New Task</div>
    <input type="hidden" id="task-modal-id">
    <div class="modal-field">
      <label>Task</label>
      <input class="fi" id="task-modal-title" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')saveTask()">
    </div>
    <div class="modal-field">
      <label>Priority</label>
      <select class="fi" id="task-modal-pri">
        <option value="high">🔴 High</option><option value="med" selected>🟡 Medium</option><option value="low">⚪ Low</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Due Date</label>
      <input class="fi" type="date" id="task-modal-due">
    </div>
    <div class="modal-field">
      <label>Category</label>
      <select class="fi" id="task-modal-cat">
        <option>Admin</option><option>Legal</option><option>Financial</option><option>Medical</option><option>Errand</option><option>Personal</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn pri" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- End of Day modal -->
<div class="modal-overlay" id="eod-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">End of Day</div>
    <div class="modal-sub">A quick reflection to close the loop</div>
    <div class="modal-field">
      <label>How do you feel?</label>
      <div class="mood-picker" id="eod-mood">

<!-- Finance FAB -->
<button class="fin-fab" id="fin-fab" onclick="openTxModal(null)" title="Add transaction">+</button>

<script>
/* ── UTILITIES ──────────────────────────────────── */
const localDate=d=>{const D=d||new Date();return D.getFullYear()+'-'+String(D.getMonth()+1).padStart(2,'0')+'-'+String(D.getDate()).padStart(2,'0');};
const today=localDate();
const currentMonth=today.slice(0,7);
const uid=()=>Math.random().toString(36).slice(2,10);
const G=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtMoney=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

/* ── STATE ──────────────────────────────────────── */
let S={finance:[],bills:[],goals:[],todos:[],habits:[],hlog:{},liveCategories:[],liveSpend:[],savingsAccounts:[],customCategories:[],meals:[],workouts:[],water:{},notes:[],schedule:[],dayLogs:{},lifeExpenses:[]};

try{const d=localStorage.getItem('lifeOS_v3');if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}

// New field guards
['meals','workouts','notes','schedule','lifeExpenses'].forEach(k=>{if(!Array.isArray(S[k]))S[k]=[];});
['water','dayLogs','hlog'].forEach(k=>{if(!S[k]||typeof S[k]!=='object')S[k]={};});
['finance','bills','goals','todos','habits','liveCategories','liveSpend','savingsAccounts','customCategories'].forEach(k=>{if(!Array.isArray(S[k]))S[k]=[];});

// Migrate habits → add stack fields
S.habits.forEach((h,i)=>{
  if(h.cue===undefined)h.cue='';
  if(h.routine===undefined)h.routine=h.name||'';
  if(h.inStack===undefined)h.inStack=false;
  if(h.order===undefined)h.order=i;
  if(h.icon===undefined)h.icon='🔁';
});
// Migrate goals
S.goals.forEach(g=>{if(!g.type)g.type='Goal';if(!g.priority)g.priority='med';if(!g.status)g.status='active';if(!g.milestones)g.milestones=[];});
// Migrate bills
S.bills.forEach(b=>{if(!b.payments)b.payments={};if(!b.category)b.category='Other';if(!b.ds)b.ds=b.s||'Unpaid';});
// Migrate todos
S.todos.forEach(t=>{if(!t.category)t.category='Personal';if(t.done===undefined)t.done=false;});
// Seed live categories
if(!S.liveCategories.length)S.liveCategories=[{id:uid(),name:'Groceries',budget:400,icon:'🛒'},{id:uid(),name:'Gas',budget:150,icon:'⛽'},{id:uid(),name:'Eating Out',budget:200,icon:'🍽️'},{id:uid(),name:'Laundry',budget:30,icon:'🧺'}];

const save=()=>{try{localStorage.setItem('lifeOS_v3',JSON.stringify(S));}catch(e){}};
save();

/* ── THEME ──────────────────────────────────────── */
let themeMode=localStorage.getItem('lifeOS_themeMode')||'system';
function applyTheme(){const dark=themeMode==='dark'||(themeMode==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.toggleAttribute('data-dark',dark);}
function setTheme(mode){themeMode=mode;localStorage.setItem('lifeOS_themeMode',mode);applyTheme();if(currentPanel==='settings')renderSettings();}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyTheme);

/* ── NAVIGATION ─────────────────────────────────── */
const TITLES={today:'Life OS',finance:'Finance',goals:'Goals',health:'Health',notes:'Notes',settings:'Settings'};
let currentPanel='today';
let viewMonth=currentMonth;
function go(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const panel=G('p-'+id);if(!panel)return;
  panel.classList.add('on');
  const tab=document.querySelector('[data-tab="'+id+'"]');if(tab)tab.classList.add('on');
  G('tb-title').textContent=TITLES[id]||id;
  currentPanel=id;
  // FAB: only show on finance panel
  const fab=G('fin-fab');
  if(fab)fab.className='fin-fab'+(id==='finance'?' visible':'');
  updateStreakBadge();
  ({today:renderToday,finance:renderFinance,goals:renderGoals,health:renderHealth,notes:renderNotes,settings:renderSettings}[id]||function(){})();
}

/* ── STREAK ─────────────────────────────────────── */
function getStackStreak(){
  const items=S.habits.filter(h=>h.inStack);if(!items.length)return 0;
  const thresh=Math.ceil(items.length*.8);let streak=0;
  const d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const dk=localDate(d),log=S.hlog[dk]||[];
    const done=items.filter(h=>log.includes(h.id)).length;
    if(done>=thresh){streak++;d.setDate(d.getDate()-1);}else break;
  }
  return streak;
}
function updateStreakBadge(){
  const s=getStackStreak();
  // Topbar badge (non-today panels)
  const el=G('tb-streak');
  if(s>0&&currentPanel!=='today'){el.style.display='flex';G('tb-streak-num').textContent=s;el.className='tb-streak'+(s>=3?' hot':'');}
  else el.style.display='none';
  // Hero badge (today panel)
  const heroB=G('los-streak-badge'),heroN=G('los-streak-num');
  if(heroB&&heroN){heroB.style.display=s>0?'flex':'none';heroN.textContent=s;}
}

/* ── MODALS ─────────────────────────────────────── */
function openModal(id){G(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){G(id).classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);}));

/* ── TODAY — HELPERS ─────────────────────────────── */
function getStackHabits(){return S.habits.filter(h=>h.inStack).sort((a,b)=>a.order-b.order);}
function getTodayLog(){return S.hlog[today]||[];}
function getItemStatus(id){const log=getTodayLog();if(log.includes(id))return'done';if(log.includes('skip_'+id))return'skipped';return'pending';}
function getCurrentHabit(){return getStackHabits().find(h=>getItemStatus(h.id)==='pending')||null;}
function isStackComplete(){const s=getStackHabits();return s.length>0&&s.every(h=>getItemStatus(h.id)!=='pending');}
function isDayStarted(){return !!(S.dayLogs[today]&&S.dayLogs[today].started)||getTodayLog().length>0;}
function toggleCollapse(id){const el=G(id);if(el)el.classList.toggle('open');}

/* ── TODAY — RENDER ─────────────────────────────── */
function renderToday(){
  const hr=new Date().getHours();
  G('today-greeting-label').textContent=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  G('today-greeting-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  updateStreakBadge();
  // Sector snapshot data
  const mnTxSnap=S.finance.filter(t=>t.date&&t.date.startsWith(currentMonth));
  const netSnap=mnTxSnap.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount||0),0)-mnTxSnap.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount||0),0);
  const activeGoals=S.goals.filter(g=>g.status==='active').length;
  const pendingTasks=S.todos.filter(t=>!t.done).length;
  const todayWaterSnap=S.water[today]||0;

  const stack=getStackHabits();
  const log=getTodayLog();
  const current=getCurrentHabit();
  const complete=isStackComplete();
  const started=isDayStarted();
  const doneCount=stack.filter(h=>getItemStatus(h.id)!=='pending').length;
  const topTasks=S.todos.filter(t=>!t.done&&(t.priority==='high'||t.due===today)).sort((a,b)=>{const o={high:0,med:1,low:2};return o[a.priority]-o[b.priority];}).slice(0,3);
  const allTasks=S.todos.filter(t=>!t.done||(t.done&&t.doneDate===today)).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const o={high:0,med:1,low:2};return o[a.priority]-o[b.priority];});

  let html='';

  if(!stack.length){
    // NO STACK
    html+=`<div class="card" style="padding:22px;text-align:center;margin-bottom:16px;">
      <div style="font-size:36px;margin-bottom:10px;">🧱</div>
      <div style="font-size:16px;font-weight:700;color:var(--t);margin-bottom:6px;">Build your habit stack</div>
      <div style="font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.6;">Chain habits with <strong>"After I do X, I will Y"</strong> to create a powerful daily flow that runs on autopilot.</div>
      <button class="btn pri" onclick="openStackModal(null)">+ Add your first habit</button>
    </div>`;
  } else if(!started){
    // MORNING TRIGGER
    if(topTasks.length){
      html+=`<div class="morning-trigger"><div class="morning-trigger-label">Today's priorities</div>`;
      topTasks.forEach(t=>{
        const priColor=t.priority==='high'?'var(--red)':t.priority==='med'?'var(--amber)':'var(--th)';
        html+=`<div class="top3-task${t.done?' done':''}" onclick="toggleTodo('${t.id}')">
          <div class="top3-task-pri" style="background:${priColor}"></div>
          <div class="top3-task-text">${esc(t.title)}</div>
          <div class="top3-task-check">${t.done?'✓':'○'}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`<div class="section-hdr">Your habit stack — ${stack.length} habit${stack.length!==1?'s':''}</div>`;
    stack.slice(0,3).forEach(h=>{
      html+=`<div class="queue-item" style="margin-bottom:5px;">
        <div class="queue-item-check"></div>
        <div class="queue-item-icon">${h.icon}</div>
        <div class="queue-item-text">${h.cue?'After '+esc(h.cue)+' → ':''}${esc(h.routine)}</div>
      </div>`;
    });
    if(stack.length>3)html+=`<div style="font-size:12px;color:var(--th);padding:6px 12px 2px;">+${stack.length-3} more habits</div>`;
    html+=`<button class="start-day-btn" onclick="startDay()">▶ Start My Stack</button>`;
  } else if(complete){
    // COMPLETE
    html+=`<div class="all-done-card">
      <div class="all-done-icon">🏆</div>
      <div class="all-done-title">Stack complete!</div>
      <div class="all-done-sub">You finished all ${stack.length} habits today. Consistency compounds.</div>
      <button class="end-day-btn" onclick="openEOD()">🌙 Log your day</button>
    </div>`;
  } else {
    // STACK FLOW
    const pct=stack.length?Math.round(doneCount/stack.length*100):0;
    html+=`<div class="stack-progress">
      <div class="stack-progress-bar"><div class="progress-wrap"><div class="progress-fill blue" style="width:${pct}%"></div></div></div>
      <div class="stack-progress-label">${doneCount} / ${stack.length}</div>
    </div>`;
    if(current){
      html+=`<div class="stack-card active">
        ${current.cue?`<div class="stack-cue">After ${esc(current.cue)}</div>`:''}
        <div class="stack-routine">${current.icon} ${esc(current.routine)}</div>
        <div class="stack-actions">
          <button class="stack-done-btn" onclick="completeHabit('${current.id}')">✓ Done</button>
          <button class="stack-skip-btn" onclick="skipHabit('${current.id}')">Skip →</button>
        </div>
      </div>`;
    }
    html+=`<div class="section-hdr">Stack queue</div><div class="stack-queue">`;
    stack.forEach(h=>{
      const st=getItemStatus(h.id);
      const isCur=current&&h.id===current.id;
      html+=`<div class="queue-item ${st==='done'?'done':st==='skipped'?'skipped':isCur?'current':''}">
        <div class="queue-item-check">${st==='done'?'✓':st==='skipped'?'–':''}</div>
        <div class="queue-item-icon">${h.icon}</div>
        <div class="queue-item-text">${esc(h.routine)}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // SECTOR SNAPSHOT GRID (always shown)
  const netColor=netSnap>=0?'up':'dn';
  const netFmt=(netSnap>=0?'+':'\u2013')+fmtMoney(netSnap);
  html+=`<div class="section-hdr">Life at a glance</div>
  <div class="sector-grid">
    <div class="sector-card" onclick="go('finance')">
      <div class="sector-card-bar" style="background:linear-gradient(90deg,#2d78a4,#5ca4cf)"></div>
      <div class="sector-card-icon">💳</div>
      <div class="sector-card-val ${netColor}">${netFmt}</div>
      <div class="sector-card-lbl">Finance</div>

let dragId=null;

      const ha=S.habits.find(h=>h.id===dragId),hb=S.habits.find(h=>h.id===el.dataset.habitId);

function renderBillsCalendar(bills,vm,todayD,isCurMn){
  const [y,m]=vm.split('-').map(Number);
  const firstDow=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const byDay={};
  bills.forEach(b=>{
    const d=b.due;if(!d)return;
    if(!byDay[d])byDay[d]=[];
    const isPaid=b.ds==='Paid'||(b.payments&&b.payments[vm]);
    const isAuto=b.ds==='Auto-pay';
    const dueDate=new Date(y,m-1,d);
    const isOver=dueDate<todayD&&!isPaid&&!isAuto&&isCurMn;
    byDay[d].push({name:b.name,color:isPaid||isAuto?'var(--green)':isOver?'var(--red)':'var(--amber)'});
  });
  const dows=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html=`<div class="bil-calendar">
    <div class="bil-cal-grid">
      ${dows.map(d=>`<div class="bil-cal-dow">${d}</div>`).join('')}`;
  for(let i=0;i<firstDow;i++)html+=`<div class="bil-cal-day other-month"></div>`;
  const todayDay=isCurMn?todayD.getDate():-1;
  for(let d=1;d<=daysInMonth;d++){
    const isT=d===todayDay;
    const dots=(byDay[d]||[]).map(b=>`<div class="bil-cal-dot" title="${esc(b.name)}" style="background:${b.color}"></div>`).join('');
    html+=`<div class="bil-cal-day${isT?' today-cal':''}">
      <div class="bil-cal-dn">${d}</div>
      ${dots}
    </div>`;
  }
  html+=`</div>`;
  if(bills.length){
    html+=`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">`;
    bills.forEach(b=>{
      const isPaid=b.ds==='Paid'||(b.payments&&b.payments[vm]);
      const isAuto=b.ds==='Auto-pay';
      const dueDate=b.due?new Date(y,m-1,b.due):null;
      const isOver=dueDate&&dueDate<todayD&&!isPaid&&!isAuto&&isCurMn;
      const dotColor=isPaid||isAuto?'var(--green)':isOver?'var(--red)':'var(--amber)';
      html+=`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ts);">
        <div style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
        ${esc(b.name)} · ${b.due?ordinal(b.due):'—'}
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function getLxStatus(lx){
  if(!lx.lastDate)return{status:'soon',label:'Not done yet',nextDate:'Unknown'};
  const last=new Date(lx.lastDate+'T00:00:00');
  const intervalDays=(lx.intervalMonths||1)*30;
  const nextD=new Date(last.getTime()+intervalDays*24*60*60*1000);
  const diffDays=Math.round((nextD-new Date())/86400000);
  const nextDate=nextD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  let status,label;
  if(diffDays<0){status='over';label=`${Math.abs(diffDays)}d overdue`;}
  else if(diffDays<=14){status='soon';label=`Due in ${diffDays}d`;}
  else{status='ok';label=`In ${diffDays}d`;}
  return{status,label,nextDate};
}

function renderFinance(){
  const mnTx=S.finance.filter(t=>t.date&&t.date.startsWith(viewMonth));
  const income=mnTx.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount||0),0);
  const expense=mnTx.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount||0),0);
  const net=income-expense;
  const billsTotal=S.bills.reduce((s,b)=>s+Number(b.amount||0),0);
  const mnDate=new Date(viewMonth+'-01');
  const mnName=mnDate.toLocaleString('en-US',{month:'long',year:'numeric'});
  const isCurrentMn=viewMonth===currentMonth;
  const catSpend={};
  mnTx.filter(t=>t.type==='expense').forEach(t=>{catSpend[t.category||'Other']=(catSpend[t.category||'Other']||0)+Number(t.amount||0);});
  const catKeys=Object.keys(catSpend).sort((a,b)=>catSpend[b]-catSpend[a]);
  const today_d=new Date();
  const maxBar=Math.max(income,expense)||1;

  // ── OVERVIEW CARD ───────────────────────────────
  let html=`<div class="fin-overview">
    <div class="fin-ov-month">${mnName}</div>
    <div class="fin-ov-net ${net>=0?'pos':'neg'}">${net>=0?'+':'–'}${fmtMoney(net)}</div>

    <div class="fin-ov-bars">
      <div class="fin-bar-row">
        <div class="fin-bar-label">Income</div>
        <div class="fin-bar-track"><div class="fin-bar-fill inc" style="width:${Math.round(income/maxBar*100)}%"></div></div>
        <div class="fin-bar-amount">+${fmtMoney(income)}</div>

        <div class="fin-bar-label">Expenses</div>

    <div class="fin-month-nav-title">${mnName}</div>
    <button class="fin-month-btn" onclick="shiftViewMonth(1)" ${isCurrentMn?'disabled style="opacity:.35;cursor:default;"':''}>›</button>
  </div>`;

  // ── STATS ROW ───────────────────────────────────
  const txCount=mnTx.length;

  html+=`<div class="fin-stats-row">
    <div class="fin-stat"><div class="fin-stat-val">${txCount}</div><div class="fin-stat-lbl">Transactions</div></div>

    <div class="fin-stat"><div class="fin-stat-val">${fmtMoney(billsTotal)}</div><div class="fin-stat-lbl">Monthly bills</div></div>
  </div>`;

  // ── SPENDING CHART ──────────────────────────────
  if(catKeys.length){
    html+=`<div class="chart-wrap">
      <div class="chart-title">Spending breakdown</div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        <div style="max-width:180px;flex-shrink:0;"><canvas id="fin-chart" height="180"></canvas></div>
        <div style="flex:1;min-width:140px;">
          ${catKeys.slice(0,6).map((k,i)=>{
            const colors=['#2d78a4','#0a7c6e','#c58c1e','#8a5fae','#c0342c','#3da892'];

  </div>`;

    html+=`<div class="card">`;

        </div>
        <div class="tx-amount ${isInc?'inc':''}" style="${isInc?'':'color:var(--t)'}">${isInc?'+':'–'}${fmtMoney(t.amount)}</div>
        <button class="btn ghost icon" style="color:var(--red)" onclick="deleteTx('${t.id}')">✕</button>
      </div>`;
    });
    html+=`</div><div style="height:72px;"></div>`; // FAB clearance
  } else {
    html+=`<div class="empty"><div class="empty-icon">💸</div><div class="empty-title">No transactions</div>Tap the <strong>+</strong> button to log income or expenses.</div>`;

/* ── GOALS ───────────────────────────────────────── */
let gpFilter='all';
function renderGoals(){
  const fil=S.goals.filter(g=>gpFilter==='all'?true:gpFilter==='Goal'?g.type==='Goal':gpFilter==='Project'?g.type==='Project':gpFilter==='active'?g.status==='active':g.status==='done');
  const active=S.goals.filter(g=>g.status==='active').length,done=S.goals.filter(g=>g.status==='done').length;
  let html=`<div class="summary-row cols-3" style="margin-top:4px;">
    <div class="sum-cell"><div class="sum-cell-val">${S.goals.length}</div><div class="sum-cell-lbl">Total</div></div>
    <div class="sum-cell"><div class="sum-cell-val">${active}</div><div class="sum-cell-lbl">Active</div></div>
    <div class="sum-cell"><div class="sum-cell-val up">${done}</div><div class="sum-cell-lbl">Done</div></div>
  </div>
  <div class="filter-row">
    ${[['all','All'],['Goal','🎯 Goals'],['Project','📁 Projects'],['active','In Progress'],['done','Completed']].map(([f,l])=>`<div class="tag${gpFilter===f?' on':''}" onclick="setGpFilter('${f}')">${l}</div>`).join('')}
    <div style="flex:1;"></div>
    <button class="btn ghost sm" onclick="openGoalModal(null)">+ Add</button>
  </div>`;
  if(fil.length){
    html+=`<div class="card">`;
    fil.forEach(g=>{
      const ms=g.milestones||[],doneMs=ms.filter(m=>m.done).length,pct=ms.length?Math.round(doneMs/ms.length*100):0;
      const priColor=g.priority==='high'?'var(--red)':g.priority==='med'?'var(--amber)':'var(--th)';
      html+=`<div class="goal-item">
        <div class="goal-header" onclick="toggleGoalExpand('${g.id}')">
          <div class="goal-type-icon">${g.type==='Project'?'📁':'🎯'}</div>
          <div class="goal-meta">
            <div class="goal-title${g.status==='done'?' done':''}">${esc(g.title)}</div>
            <div class="goal-sub">${esc(g.category)}${g.deadline?' · '+g.deadline:''} · <span style="color:${priColor}">${g.priority}</span></div>
          </div>
          <button class="btn ghost icon" onclick="event.stopPropagation();openGoalModal('${g.id}')">✏</button>
          <button class="btn ghost icon" style="color:var(--red)" onclick="event.stopPropagation();deleteGoal('${g.id}')">✕</button>
        </div>
        ${ms.length?`<div style="margin-top:8px;"><div class="goal-progress-row"><div class="goal-progress-label">${doneMs}/${ms.length} milestones</div><div class="goal-progress-pct">${pct}%</div></div><div class="progress-wrap"><div class="progress-fill ${pct===100?'green':'blue'}" style="width:${pct}%"></div></div></div>`:''}
        <div class="milestone-list" id="ml-${g.id}">
          ${ms.map(m=>`<div class="milestone-item${m.done?' done':''}" onclick="toggleMilestone('${g.id}','${m.id}')">
            <div class="milestone-check">${m.done?'✓':''}</div>
            <div class="milestone-text">${esc(m.title)}</div>
            <button class="btn ghost icon" style="color:var(--red);font-size:12px;padding:2px 5px;" onclick="event.stopPropagation();deleteMilestone('${g.id}','${m.id}')">✕</button>
          </div>`).join('')}
          <div style="padding:8px 0 4px;"><input class="fi" placeholder="+ Add milestone" style="font-size:13px;" onkeydown="if(event.key==='Enter'&&this.value.trim()){addMilestone('${g.id}',this.value);this.value='';}"></div>
          <div style="padding:2px 0 10px;"><button class="btn sm ${g.status==='done'?'':'green'}" onclick="toggleGoalStatus('${g.id}')">${g.status==='done'?'↩ Reopen':'✓ Mark done'}</button></div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  } else html+=`<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">No goals here</div>Add a goal or project to track your big objectives.</div>`;
  G('goals-body').innerHTML=html;
}
function setGpFilter(f){gpFilter=f;renderGoals();}
function toggleGoalExpand(id){const el=G('ml-'+id);if(el)el.classList.toggle('open');}
function openGoalModal(id){
  const g=id?S.goals.find(g=>g.id===id):null;
  G('goal-modal-id').value=id||'';G('goal-modal-title').textContent=g?'Edit Goal':'New Goal';
  G('goal-modal-title-inp').value=g?g.title:'';G('goal-modal-type').value=g?(g.type||'Goal'):'Goal';
  G('goal-modal-cat').value=g?(g.category||'Personal'):'Personal';G('goal-modal-due').value=g?(g.deadline||''):'';
  G('goal-modal-pri').value=g?(g.priority||'med'):'med';
  openModal('goal-modal');setTimeout(()=>G('goal-modal-title-inp').focus(),300);
}
function saveGoal(){
  const id=G('goal-modal-id').value,title=G('goal-modal-title-inp').value.trim();if(!title)return;
  const type=G('goal-modal-type').value,cat=G('goal-modal-cat').value,deadline=G('goal-modal-due').value,priority=G('goal-modal-pri').value;
  if(id){const g=S.goals.find(g=>g.id===id);if(g)Object.assign(g,{title,type,category:cat,deadline,priority});}
  else S.goals.push({id:uid(),title,type,category:cat,deadline,priority,status:'active',milestones:[]});
  save();closeModal('goal-modal');renderGoals();
}
function deleteGoal(id){if(!confirm('Delete this goal?'))return;S.goals=S.goals.filter(g=>g.id!==id);save();renderGoals();}
function toggleGoalStatus(id){const g=S.goals.find(g=>g.id===id);if(g){g.status=g.status==='done'?'active':'done';save();renderGoals();}}
function addMilestone(gid,title){
  title=title.trim();if(!title)return;
  const g=S.goals.find(g=>g.id===gid);if(!g)return;
  if(!g.milestones)g.milestones=[];g.milestones.push({id:uid(),title,done:false});
  save();renderGoals();setTimeout(()=>{const el=G('ml-'+gid);if(el)el.classList.add('open');},50);
}
function toggleMilestone(gid,mid){
  const g=S.goals.find(g=>g.id===gid);if(!g)return;
  const m=g.milestones.find(m=>m.id===mid);if(!m)return;
  m.done=!m.done;save();renderGoals();setTimeout(()=>{const el=G('ml-'+gid);if(el)el.classList.add('open');},50);
}
function deleteMilestone(gid,mid){const g=S.goals.find(g=>g.id===gid);if(!g)return;g.milestones=g.milestones.filter(m=>m.id!==mid);save();renderGoals();}

/* ── HEALTH ──────────────────────────────────────── */
const MEAL_TYPES=[{id:'breakfast',label:'Breakfast',icon:'🌅'},{id:'lunch',label:'Lunch',icon:'☀️'},{id:'dinner',label:'Dinner',icon:'🌙'},{id:'snack',label:'Snack',icon:'🍎'}];

function renderHealth(){
  const todayMeals=S.meals.filter(m=>m.date===today);
  const todayWater=S.water[today]||0;
  const d7=new Date();d7.setDate(d7.getDate()-7);
  const weekWO=S.workouts.filter(w=>w.date>=localDate(d7)).length;
  const totalCal=todayMeals.reduce((s,m)=>s+(parseInt(m.cal)||0),0);

  let html=`<div class="summary-row cols-3" style="margin-top:4px;">
    <div class="sum-cell"><div class="sum-cell-val">${todayMeals.length}</div><div class="sum-cell-lbl">Meals today</div></div>
    <div class="sum-cell"><div class="sum-cell-val blue" style="color:var(--blue)">${todayWater}</div><div class="sum-cell-lbl">Glasses H₂O</div></div>
    <div class="sum-cell"><div class="sum-cell-val">${weekWO}</div><div class="sum-cell-lbl">Workouts (7d)</div></div>
  </div>
  <div class="section-hdr">Today's meals${totalCal?' · '+totalCal+' cal':''}</div>`;

  MEAL_TYPES.forEach(type=>{
    const entries=todayMeals.filter(m=>m.type===type.id);
    const mCal=entries.reduce((s,m)=>s+(parseInt(m.cal)||0),0);
    html+=`<div class="meal-section">
      <div class="meal-section-hdr" onclick="toggleMealSection('${type.id}')">
        <div class="meal-section-icon">${type.icon}</div>
        <div class="meal-section-label">${type.label}</div>
        <div class="meal-section-meta">${entries.length?entries.length+' item'+(entries.length>1?'s':'')+(mCal?' · '+mCal+' cal':''):'empty'}</div>
      </div>
      <div class="meal-section-body" id="meal-body-${type.id}">
        ${entries.map(m=>`<div class="meal-entry">
          <div class="meal-entry-text">${esc(m.desc)}</div>
          <div class="meal-entry-cal">${m.cal?m.cal+' cal':''}</div>
          <span class="meal-entry-del" onclick="deleteMeal('${m.id}')">✕</span>
        </div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:10px;">
          <input class="fi" id="meal-inp-${type.id}" placeholder="What did you eat?" style="flex:2;" onkeydown="if(event.key==='Enter')addMeal('${type.id}')">
          <input class="fi" id="meal-cal-${type.id}" type="number" placeholder="Cal" style="max-width:80px;" inputmode="numeric">
          <button class="btn sm" onclick="addMeal('${type.id}')">Add</button>
        </div>
      </div>
    </div>`;
  });

  html+=`<div class="section-hdr" style="margin-top:20px;">Water</div>
  <div class="water-tracker">
    <div class="water-header">
      <span style="font-size:20px;">💧</span>
      <div class="water-title">Today's water intake</div>
      <div class="water-count">${todayWater} / 8 glasses</div>
    </div>
    <div class="water-glasses">`;
  for(let i=1;i<=8;i++)html+=`<div class="glass${i<=todayWater?' filled':''}" onclick="setWater(${i})" title="${i} glass${i>1?'es':''}">💧</div>`;
  html+=`</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn sm ghost" onclick="setWater(${Math.max(0,todayWater-1)})">− Glass</button>
      <button class="btn sm" onclick="setWater(${todayWater+1})">+ Glass</button>
    </div>
  </div>`;

  html+=`<div class="flex-hdr" style="margin-top:20px;"><div class="section-hdr" style="margin:0;">Workouts</div><button class="btn ghost sm" onclick="openWorkoutModal(null)">+ Log</button></div>`;
  const recWO=[...S.workouts].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if(recWO.length){
    html+=`<div class="card">`;
    recWO.forEach(w=>{html+=`<div class="workout-item">
      <div class="workout-icon">${WORKOUT_ICON[w.type]||'💪'}</div>
      <div class="workout-meta"><div class="workout-type">${esc(w.type)}</div><div class="workout-details">${w.date}${w.notes?' · '+esc(w.notes):''}</div></div>
      <div class="workout-duration">${w.duration} min</div>
      <button class="btn ghost icon" style="color:var(--red)" onclick="deleteWorkout('${w.id}')">✕</button>

  } else html+=`<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-title">No workouts logged</div>Log your first workout to start tracking.</div>`;

  G('health-body').innerHTML=html;

  <div class="week-mini">`;

        <button class="btn ghost icon" style="color:var(--red)" onclick="deleteSched('${s.id}')">✕</button>
      </div>`;
    });
    html+=`</div>`;
  } else html+=`<div style="font-size:12px;color:var(--th);padding:6px 0 10px;">Nothing scheduled in the next 7 days.</div>`;

  const tags=['legal','financial','medical','personal','errand','work'];
  html+=`<div class="flex-hdr" style="margin-top:20px;"><div class="section-hdr" style="margin:0;">Notes</div><button class="btn ghost sm" onclick="openNoteModal(null)">+ New</button></div>
  <div class="filter-row">
    <div class="tag${!noteFilter?' on':''}" onclick="setNoteFilter('')">All</div>
    ${tags.map(t=>`<div class="tag${noteFilter===t?' on':''}" onclick="setNoteFilter('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}
  </div>`;

  if(filtNotes.length){
    html+=`<div class="card">`;
    filtNotes.forEach(n=>{
      html+=`<div class="note-item" onclick="openNoteModal('${n.id}')">
        <div class="note-title">${esc(n.title)}</div>
        ${n.body?`<div class="note-preview">${esc(n.body)}</div>`:''}
        <div class="note-footer">
          ${n.tag?`<div class="badge gray">${esc(n.tag)}</div>`:''}
          <div class="note-date">${n.date}</div>
          <button class="btn ghost icon" style="color:var(--red);margin-left:auto;padding:2px 5px;font-size:13px;" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  } else html+=`<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">${noteFilter?'No '+noteFilter+' notes':'No notes yet'}</div></div>`;

  G('notes-body').innerHTML=html;
}
function setNoteFilter(f){noteFilter=f;renderNotes();}
function openNoteModal(id){
  const n=id?S.notes.find(n=>n.id===id):null;
  G('note-modal-id').value=id||'';G('note-modal-title').textContent=n?'Edit Note':'New Note';
  G('note-modal-title-inp').value=n?n.title:'';G('note-modal-body').value=n?(n.body||''):'';
  G('note-modal-tag').value=n?(n.tag||''):'';
  openModal('note-modal');setTimeout(()=>G('note-modal-title-inp').focus(),300);
}
function saveNote(){
  const id=G('note-modal-id').value,title=G('note-modal-title-inp').value.trim();if(!title)return;
  const body=G('note-modal-body').value.trim(),tag=G('note-modal-tag').value;
  if(id){const n=S.notes.find(n=>n.id===id);if(n)Object.assign(n,{title,body,tag});}
  else S.notes.push({id:uid(),title,body,tag,date:today});
  save();closeModal('note-modal');renderNotes();
}
function deleteNote(id){if(!confirm('Delete this note?'))return;S.notes=S.notes.filter(n=>n.id!==id);save();renderNotes();}
function openSchedModal(id){
  const s=id?S.schedule.find(s=>s.id===id):null;
  G('sched-modal-id').value=id||'';G('sched-modal-title').textContent=s?'Edit Event':'Add to Schedule';
  G('sched-modal-title-inp').value=s?s.title:'';G('sched-modal-date').value=s?s.date:today;
  G('sched-modal-time').value=s?(s.time||''):'';
  openModal('sched-modal');setTimeout(()=>G('sched-modal-title-inp').focus(),300);
}
function saveSchedItem(){
  const id=G('sched-modal-id').value,title=G('sched-modal-title-inp').value.trim();if(!title)return;
  const date=G('sched-modal-date').value||today,time=G('sched-modal-time').value;
  if(id){const s=S.schedule.find(s=>s.id===id);if(s)Object.assign(s,{title,date,time});}
  else S.schedule.push({id:uid(),title,date,time});
  save();closeModal('sched-modal');renderNotes();
}
function deleteSched(id){S.schedule=S.schedule.filter(s=>s.id!==id);save();renderNotes();}

/* ── SETTINGS ────────────────────────────────────── */

  G('settings-body').innerHTML=`
  <div style="padding:16px 0 14px;">

    <div style="font-size:13px;color:var(--ts);">Life OS · Habit Stacking Edition</div>
  </div>
  <div class="stt-section">
    <div class="stt-section-hdr">Appearance</div>
    <div class="card">
      <div class="theme-picker">
        ${['light','dark','system'].map(m=>`<div class="theme-opt${themeMode===m?' on':''}" onclick="setTheme('${m}')"><div class="theme-swatch ${m}"></div><div class="theme-label">${m.charAt(0).toUpperCase()+m.slice(1)}</div></div>`).join('')}

      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Current streak</div><div class="stt-row-sub">Consecutive days ≥80% of stack complete</div></div><div style="font-size:20px;font-weight:800;color:var(--amber);">${getStackStreak()} 🔥</div></div>
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Stack size</div><div class="stt-row-sub">Habits in your current stack</div></div><div style="font-size:17px;font-weight:700;">${S.habits.filter(h=>h.inStack).length}</div></div>
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Total habits</div><div class="stt-row-sub">Including non-stack habits</div></div><div style="font-size:17px;font-weight:700;">${S.habits.length}</div></div>
    </div>
  </div>
  <div class="stt-section">
    <div class="stt-section-hdr">Data</div>
    <div class="card">
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Storage used</div><div class="stt-row-sub">${kb} KB in localStorage</div></div></div>
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Export data</div><div class="stt-row-sub">Download a JSON backup</div></div><button class="btn sm" onclick="exportData()">Export</button></div>
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label">Import data</div><div class="stt-row-sub">Restore from a backup file</div></div><button class="btn sm" onclick="G('import-file').click()">Import</button><input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)"></div>
    </div>
  </div>
  <div class="stt-section">
    <div class="stt-section-hdr" style="color:var(--red);">Danger zone</div>
    <div class="card">
      <div class="stt-row"><div class="stt-row-info"><div class="stt-row-label" style="color:var(--red);">Clear all data</div><div class="stt-row-sub">Permanently delete everything. Cannot be undone.</div></div><button class="btn sm" style="border-color:var(--red);color:var(--red);" onclick="clearAllData()">Clear</button></div>
    </div>

function exportData(){
  const d=localStorage.getItem('lifeOS_v3')||'{}',blob=new Blob([d],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='lifeOS-backup-'+today+'.json';a.click();URL.revokeObjectURL(url);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{JSON.parse(e.target.result);localStorage.setItem('lifeOS_v3',e.target.result);location.reload();}catch(err){alert('Invalid backup file.');}};
  r.readAsText(file);
}
function clearAllData(){
  if(!confirm('Delete all your data permanently?'))return;
  if(!confirm('This cannot be undone. Are you sure?'))return;
  localStorage.removeItem('lifeOS_v3');location.reload();
}

/* ── PULL-TO-REFRESH ─────────────────────────────── */
function initPTR(){
  const THRESHOLD=65;
  let startY=0,pulling=false,triggered=false;
  // Inject indicator into main-content
  const mc=document.querySelector('.main-content');
  const ind=document.createElement('div');ind.className='ptr-indicator';
  const spinner=document.createElement('div');spinner.className='ptr-spinner';
  ind.appendChild(spinner);mc.insertBefore(ind,mc.firstChild);

  mc.addEventListener('touchstart',e=>{
    const panel=document.querySelector('.panel.on');
    if(!panel||panel.scrollTop>0)return;
    startY=e.touches[0].clientY;pulling=true;triggered=false;
  },{passive:true});

  mc.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const panel=document.querySelector('.panel.on');
    if(!panel||panel.scrollTop>0){pulling=false;return;}
    const dy=e.touches[0].clientY-startY;
    if(dy<=0){ind.style.height='0';return;}
    const h=Math.min(dy*0.5,THRESHOLD+10);
    ind.style.height=h+'px';
    ind.classList.toggle('active',h>20);
    ind.classList.toggle('ready',h>=THRESHOLD);
    triggered=h>=THRESHOLD;
  },{passive:true});

  mc.addEventListener('touchend',()=>{
    if(!pulling)return;
    pulling=false;
    if(triggered){
      ind.style.height='46px';
      ind.classList.add('active');
      setTimeout(()=>{
        const renders={today:renderToday,finance:renderFinance,goals:renderGoals,health:renderHealth,notes:renderNotes,settings:renderSettings};
        (renders[currentPanel]||function(){})();
        ind.style.height='0';ind.classList.remove('active','ready');
      },600);
    } else {
      ind.style.height='0';ind.classList.remove('active','ready');
    }
    triggered=false;
  });
}

/* ── INIT ────────────────────────────────────────── */
document.querySelectorAll('input[type=date]').forEach(el=>{if(!el.value)el.value=today;});
initPTR();
renderToday();
updateStreakBadge();
